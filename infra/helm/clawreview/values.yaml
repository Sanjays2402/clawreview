image:
  server:
    repository: ghcr.io/sanjays2402/clawreview-server
    tag: latest
    pullPolicy: IfNotPresent
  dashboard:
    repository: ghcr.io/sanjays2402/clawreview-dashboard
    tag: latest
    pullPolicy: IfNotPresent

replicaCount:
  server: 2
  dashboard: 2

service:
  type: ClusterIP

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: clawreview.example.com
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
        - path: /webhooks/github
          pathType: Prefix
          service: server
  tls: []

env:
  NODE_ENV: production
  REVIEW_CONCURRENCY: "6"
  # Sentry tuning. The DSN itself lives in secrets.sentryDsn so it can be
  # rotated without re-rendering the chart. Leave empty to disable.
  SENTRY_ENVIRONMENT: "production"
  SENTRY_TRACES_SAMPLE_RATE: "0"

# Pod annotations applied per-deployment. The server entries enable
# Prometheus scraping of /metrics out of the box; remove them if you use
# a ServiceMonitor instead.
podAnnotations:
  server:
    prometheus.io/scrape: "true"
    prometheus.io/port: "4000"
    prometheus.io/path: "/metrics"
  dashboard: {}

secrets:
  databaseUrl: ""
  # Redis connection string. Required for production: the per-token
  # rate limiter uses Redis as a distributed sliding-window backend so
  # quotas hold across all server replicas. When empty, each replica
  # falls back to an in-process limiter and the aggregate ceiling
  # becomes replicaCount * perMinute. The same Redis is used by the
  # review job queue (BullMQ).
  redisUrl: ""
  githubAppId: ""
  githubAppPrivateKey: ""
  githubWebhookSecret: ""
  llmOpenaiApiKey: ""
  cookieSecret: "change-me"
  sentryDsn: ""
  # API bearer tokens, comma-separated. Preferred format encodes the
  # role: "name:role:token" where role is readonly | operator | admin.
  # Example:
  #   "dashboard:readonly:<hex>,ops:operator:<hex>,root:admin:<hex>"
  # Legacy "name:token" and bare-token entries are still accepted and
  # default to the admin role to preserve the pre-RBAC contract.
  # The server refuses to start in production when this is empty.
  apiAuthTokens: ""

resources:
  server:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  dashboard:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

# Horizontal Pod Autoscaler. Disabled by default so static replicaCount
# stays authoritative; flip enabled=true once metrics-server is installed
# in the target cluster.
autoscaling:
  server:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  dashboard:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# Pod Disruption Budgets keep at least one replica available during
# voluntary disruptions (node drains, cluster upgrades).
podDisruptionBudget:
  server:
    enabled: true
    minAvailable: 1
    maxUnavailable: null
  dashboard:
    enabled: true
    minAvailable: 1
    maxUnavailable: null

# ServiceMonitor for the Prometheus Operator. Set enabled=true when the
# kube-prometheus-stack (or any operator that watches monitoring.coreos.com
# CRDs) is installed in the cluster. Disabled by default so the chart still
# installs on clusters without those CRDs registered.
serviceMonitor:
  enabled: false
  # namespace: monitoring  # only set if scraping from a different ns
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  additionalLabels: {}
  metricRelabelings: []

# PrometheusRule ships SRE-grade alerts derived from the metrics the server
# already exports (http_request_duration_seconds, clawreview_queue_depth,
# clawreview_reviews_completed_total, clawreview_llm_cost_usd_total).
# Thresholds are overridable; values reflect a small production deployment.
prometheusRule:
  enabled: false
  # namespace: monitoring
  interval: 30s
  additionalLabels: {}
  thresholds:
    downFor: 5m
    errorRate: 0.05            # 5% 5xx rate over 5m, sustained 10m
    latencyP95Seconds: 1.5     # p95 above 1.5s sustained 10m
    queueDepth: 500            # pending jobs backlog
    reviewFailureRate: 0.20    # 20% reviews failing
    llmSpendHourlyUsd: 25      # USD spent per hour spike

# NetworkPolicy locks down pod-to-pod traffic. Requires a CNI that
# enforces policies (Calico, Cilium, etc.). Off by default for clusters
# without a policy-aware CNI.
networkPolicy:
  enabled: false
  server:
    # Namespaces (by kubernetes.io/metadata.name label) allowed to reach
    # the server pods on port 4000. Add your ingress controller namespace
    # (for example "ingress-nginx") and any monitoring namespace that
    # scrapes /metrics.
    allowFromNamespaces:
      - ingress-nginx
      - monitoring
    extraIngressFrom: []
    extraEgress: []
  dashboard:
    allowFromNamespaces:
      - ingress-nginx
    extraIngressFrom: []

# Postgres backup CronJob. Runs pg_dump inside the cluster and uploads a
# gzipped logical dump to an S3-compatible bucket. Off by default so the
# chart installs without S3 credentials; enable in production and supply
# bucket + access keys. Restore procedure lives in
# docs/runbooks/database-restore.md.
backup:
  enabled: false
  schedule: "15 3 * * *"           # 03:15 UTC daily
  timeZone: "Etc/UTC"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  backoffLimit: 2
  activeDeadlineSeconds: 3600       # job killed if it runs past 1h
  ttlSecondsAfterFinished: 604800   # cleanup completed jobs after 7d
  tmpSizeLimit: 5Gi
  # Refuse to upload a dump smaller than this many bytes. Guards against
  # a silent pg_dump failure that returns a tiny file (just headers) and
  # would otherwise quietly overwrite good backups on the next retention
  # window. 4 KiB catches the empty-database case while staying safely
  # below any real schema dump.
  minDumpBytes: 4096
  image:
    # Bundles postgresql-client (pg_dump) and awscli on alpine. Pin a
    # specific digest in production.
    repository: ghcr.io/sanjays2402/pg-backup
    tag: "16-awscli"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  s3:
    bucket: ""
    prefix: "clawreview/postgres"
    region: "us-east-1"
    # Optional: set for non-AWS S3 (MinIO, R2, B2, Wasabi). Leave empty
    # for AWS S3 itself.
    endpoint: ""
    storageClass: "STANDARD_IA"
    accessKeyId: ""
    secretAccessKey: ""
