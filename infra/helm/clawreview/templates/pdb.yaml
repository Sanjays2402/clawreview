{{- if .Values.podDisruptionBudget.server.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-server
  labels:
    {{- include "clawreview.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  {{- with .Values.podDisruptionBudget.server.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.podDisruptionBudget.server.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "clawreview.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
{{- end }}
{{- if .Values.podDisruptionBudget.dashboard.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-dashboard
  labels:
    {{- include "clawreview.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  {{- with .Values.podDisruptionBudget.dashboard.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.podDisruptionBudget.dashboard.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "clawreview.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
{{- end }}
