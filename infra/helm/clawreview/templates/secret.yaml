apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "clawreview.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  GITHUB_APP_ID: {{ .Values.secrets.githubAppId | quote }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.secrets.githubAppPrivateKey | quote }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.secrets.githubWebhookSecret | quote }}
  LLM_OPENAI_API_KEY: {{ .Values.secrets.llmOpenaiApiKey | quote }}
  COOKIE_SECRET: {{ .Values.secrets.cookieSecret | quote }}
