name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: ClawReview version
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Include reproduction steps and what you expected.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
