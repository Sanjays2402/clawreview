version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      typescript:
        patterns: ["typescript", "@types/*"]
      eslint:
        patterns: ["eslint*", "@typescript-eslint/*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
